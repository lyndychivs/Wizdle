name: Solving Wordle
run-name: Solving Wordle
permissions:
    contents: read
on:
    push:
    schedule:
        - cron: "0 8 * * *"
jobs:
    solve_wordle:
        name: Solve Wordle
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            CONFIGURATION: Release
            TARGET_FRAMEWORK: net10.0
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v7

            - name: Install .NET
              uses: actions/setup-dotnet@v6
              with:
                  global-json-file: global.json

            - name: Restore
              run: dotnet restore

            - name: Build
              id: build
              run: dotnet build --no-restore --configuration ${{ env.CONFIGURATION }}

            - name: Cache Playwright Browsers
              id: playwright_cache
              if: steps.build.outcome == 'success'
              uses: actions/cache@v6
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}

            - name: Install Playwright Browsers
              if: steps.build.outcome == 'success'
              run: pwsh Wizdle.Functional.Tests/bin/${{ env.CONFIGURATION }}/${{ env.TARGET_FRAMEWORK }}/playwright.ps1 install --with-deps

            - name: Test Wizdle.Functional.Tests
              if: steps.build.outcome == 'success'
              run: dotnet test --project Wizdle.Functional.Tests/Wizdle.Functional.Tests.csproj --no-build --configuration ${{ env.CONFIGURATION }} --

            - name: Upload Artifacts for Wizdle.Functional.Tests
              uses: actions/upload-artifact@v7
              if: (!cancelled() && steps.build.outcome == 'success')
              with:
                  name: Wizdle.Functional.Tests
                  retention-days: 20
                  if-no-files-found: ignore
                  path: |
                      Wizdle.Functional.Tests/bin/**/playwright-traces/
