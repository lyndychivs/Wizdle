name: Build & Test
run-name: Build & Test
permissions:
    contents: read
    checks: write
    pull-requests: write
on:
    push:
    schedule:
        - cron: "0 4 * * SUN"
    workflow_call:
jobs:
    get_version:
        name: Get Version
        uses: ./.github/workflows/get_version.yaml

    build_test:
        name: Build & Test
        needs: [get_version]
        runs-on: ubuntu-latest
        timeout-minutes: 15
        env:
            CONFIGURATION: Release
            TARGET_FRAMEWORK: net10.0
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: Install .NET
              uses: actions/setup-dotnet@v5
              with:
                  global-json-file: global.json

            - name: Restore
              run: dotnet restore

            - name: Build
              id: build
              run: dotnet build --no-restore --configuration ${{ env.CONFIGURATION }} /p:Version=${{ needs.get_version.outputs.version }}

            - name: Test Wizdle.Unit.Tests
              if: steps.build.outcome == 'success'
              run: dotnet test --project Wizdle.Unit.Tests/Wizdle.Unit.Tests.csproj --no-build --configuration ${{ env.CONFIGURATION }} -- --report-trx --report-trx-filename Wizdle.Unit.Tests.trx

            - name: Test Wizdle.Api.Unit.Tests
              if: steps.build.outcome == 'success'
              run: dotnet test --project Wizdle.Api.Unit.Tests/Wizdle.Api.Unit.Tests.csproj --no-build --configuration ${{ env.CONFIGURATION }} -- --report-trx --report-trx-filename Wizdle.Api.Unit.Tests.trx

            - name: Test Wizdle.Web.Unit.Tests
              if: steps.build.outcome == 'success'
              run: dotnet test --project Wizdle.Web.Unit.Tests/Wizdle.Web.Unit.Tests.csproj --no-build --configuration ${{ env.CONFIGURATION }} -- --report-trx --report-trx-filename Wizdle.Web.Unit.Tests.trx

            - name: Test Wizdle.Discord.Unit.Tests
              if: steps.build.outcome == 'success'
              run: dotnet test --project Wizdle.Discord.Unit.Tests/Wizdle.Discord.Unit.Tests.csproj --no-build --configuration ${{ env.CONFIGURATION }} -- --report-trx --report-trx-filename Wizdle.Discord.Unit.Tests.trx

            - name: Test Wizdle.Integration.Tests
              if: steps.build.outcome == 'success'
              run: dotnet test --project Wizdle.Integration.Tests/Wizdle.Integration.Tests.csproj --no-build --configuration ${{ env.CONFIGURATION }} -- --report-trx --report-trx-filename Wizdle.Integration.Tests.trx

            - name: Build Docker for Wizdle.Api
              id: build_api
              if: steps.build.outcome == 'success'
              run: make build-api

            - name: Test Wizdle.Api.Functional.Tests
              if: steps.build_api.outcome == 'success'
              run: dotnet test --project Wizdle.Api.Functional.Tests/Wizdle.Api.Functional.Tests.csproj --no-build --configuration ${{ env.CONFIGURATION }} -- --report-trx --report-trx-filename Wizdle.Api.Functional.Tests.trx

            - name: Cache Playwright Browsers
              id: playwright_cache
              if: steps.build.outcome == 'success'
              uses: actions/cache@v5
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}

            - name: Install Playwright Browsers
              id: install_playwright
              if: steps.playwright_cache.outputs.cache-hit != 'true' && steps.build.outcome == 'success'
              run: pwsh Wizdle.Web.Functional.Tests/bin/${{ env.CONFIGURATION }}/${{ env.TARGET_FRAMEWORK }}/playwright.ps1 install --with-deps

            - name: Install Playwright OS Dependencies
              if: steps.playwright_cache.outputs.cache-hit == 'true' && steps.build.outcome == 'success'
              run: pwsh Wizdle.Web.Functional.Tests/bin/${{ env.CONFIGURATION }}/${{ env.TARGET_FRAMEWORK }}/playwright.ps1 install-deps

            - name: Build Docker for Wizdle.Web
              id: build_web
              if: steps.build.outcome == 'success'
              run: make build-web

            - name: Test Wizdle.Web.Functional.Tests
              if: steps.build_web.outcome == 'success'
              run: dotnet test --project Wizdle.Web.Functional.Tests/Wizdle.Web.Functional.Tests.csproj --no-build --configuration ${{ env.CONFIGURATION }} -- --report-trx --report-trx-filename Wizdle.Web.Functional.Tests.trx

            - name: Upload Artifacts for Wizdle.Web.Functional.Tests
              uses: actions/upload-artifact@v7
              if: (!cancelled() && steps.build.outcome == 'success')
              with:
                  name: Wizdle.Web.Functional.Tests
                  retention-days: 20
                  if-no-files-found: error
                  path: |
                      Wizdle.Web.Functional.Tests/bin/**/reports/
                      Wizdle.Web.Functional.Tests/bin/**/screenshots/
                      Wizdle.Web.Functional.Tests/bin/**/playwright-traces/

            - name: Upload Test Results
              uses: actions/upload-artifact@v7
              if: (!cancelled() && steps.build.outcome == 'success')
              with:
                  name: test-results-linux
                  retention-days: 1
                  if-no-files-found: warn
                  path: "**/*.trx"

    build_test_windows:
        name: Build & Test (Windows Wizdle.Wpf)
        needs: [get_version]
        runs-on: windows-latest
        timeout-minutes: 10
        env:
            CONFIGURATION: Release
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: Install .NET
              uses: actions/setup-dotnet@v5
              with:
                  global-json-file: global.json

            - name: Restore Wizdle.Wpf.Unit.Tests
              run: dotnet restore Wizdle.Wpf.Unit.Tests/Wizdle.Wpf.Unit.Tests.csproj

            - name: Build Wizdle.Wpf.Unit.Tests
              id: build
              run: dotnet build Wizdle.Wpf.Unit.Tests/Wizdle.Wpf.Unit.Tests.csproj --no-restore --configuration ${{ env.CONFIGURATION }} /p:Version=${{ needs.get_version.outputs.version }}

            - name: Test Wizdle.Wpf.Unit.Tests
              if: steps.build.outcome == 'success'
              run: dotnet test --project Wizdle.Wpf.Unit.Tests/Wizdle.Wpf.Unit.Tests.csproj --no-build --configuration ${{ env.CONFIGURATION }} -- --report-trx --report-trx-filename Wizdle.Wpf.Unit.Tests.trx

            - name: Upload Test Results
              uses: actions/upload-artifact@v7
              if: (!cancelled() && steps.build.outcome == 'success')
              with:
                  name: test-results-windows
                  retention-days: 1
                  if-no-files-found: warn
                  path: "**/*.trx"

    publish_test_results:
        name: Publish Test Results
        runs-on: ubuntu-latest
        needs: [build_test, build_test_windows]
        if: ${{ always() && !cancelled() }}
        steps:
            - name: Download Test Results
              uses: actions/download-artifact@v8
              with:
                  pattern: test-results-*
                  merge-multiple: true
                  path: test-results

            - name: Publish Test Results
              uses: EnricoMi/publish-unit-test-result-action/linux@v2
              with:
                  files: "test-results/**/*.trx"
                  action_fail_on_inconclusive: true
