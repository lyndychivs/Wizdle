name: Deploy to Microsoft Azure
run-name: "Deploy to Microsoft Azure: ${{ github.ref_name }}"
permissions:
    contents: read
on:
    workflow_dispatch:
    workflow_call:
jobs:
    deploy_azure:
        name: Deploy to Microsoft Azure
        runs-on: ubuntu-latest
        timeout-minutes: 15
        environment: production
        permissions:
            id-token: write
            contents: read
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: Install Azure Developer CLI
              uses: azure/setup-azd@v2

            - name: Log in to Azure Developer CLI
              run: |
                  azd auth login \
                    --client-id "$AZURE_CLIENT_ID" \
                    --federated-credential-provider github \
                    --tenant-id "$AZURE_TENANT_ID"
              env:
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

            - name: Provision and Deploy
              run: azd up --no-prompt
              working-directory: Wizdle.AppHost
              env:
                  AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
                  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
                  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
                  DOTNET_ENVIRONMENT: Production
                  EnableDiscord: "true"
                  Discord__Token: ${{ secrets.DISCORD_TOKEN }}
                  Discord__PublicKey: ${{ secrets.DISCORD_PUBLIC_KEY }}

            - name: Log in to Azure CLI
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Set Domain for Wizdle Web
              working-directory: Wizdle.AppHost
              env:
                  AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
                  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
                  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
                  WIZDLE_WEB_CUSTOM_HOSTNAME: ${{ vars.WIZDLE_WEB_CUSTOM_HOSTNAME }}
                  CERTIFICATE_NAME: ${{ vars.CERTIFICATE_NAME }}
              run: |
                  RESOURCE_GROUP=$(azd env get-value AZURE_RESOURCE_GROUP)
                  echo "Resource group: $RESOURCE_GROUP"

                  if [ -z "$RESOURCE_GROUP" ]; then
                    echo "AZURE_RESOURCE_GROUP is empty."
                    exit 1
                  fi

                  if [ -z "$WIZDLE_WEB_CUSTOM_HOSTNAME" ]; then
                    echo "WIZDLE_WEB_CUSTOM_HOSTNAME is not set."
                    exit 1
                  fi

                  if [ -z "$CERTIFICATE_NAME" ]; then
                    echo "CERTIFICATE_NAME is not set."
                    exit 1
                  fi

                  ENV_RESOURCE_ID=$(az containerapp show \
                    --name wizdle-web \
                    --resource-group "$RESOURCE_GROUP" \
                    --query 'properties.managedEnvironmentId' \
                    --output tsv 2>/tmp/wizdle_web_env_err.txt || true)

                  if [ -z "$ENV_RESOURCE_ID" ]; then
                    ENV_RESOURCE_ID=$(az containerapp show \
                      --name wizdle-web \
                      --resource-group "$RESOURCE_GROUP" \
                      --query 'properties.environmentId' \
                      --output tsv 2>>/tmp/wizdle_web_env_err.txt || true)
                  fi

                  if [ -z "$ENV_RESOURCE_ID" ]; then
                    echo "Could not determine Container Apps environment ID for wizdle-web."
                    cat /tmp/wizdle_web_env_err.txt || true
                    exit 1
                  fi

                  CONTAINER_ENV="${ENV_RESOURCE_ID##*/}"
                  echo "Container Apps environment: $CONTAINER_ENV"

                  CERT_EXISTS=$(az containerapp env certificate list \
                    --name "$CONTAINER_ENV" \
                    --resource-group "$RESOURCE_GROUP" \
                    --query "[?name=='$CERTIFICATE_NAME'].name" \
                    --output tsv 2>/tmp/wizdle_web_cert_err.txt || true)

                  if [ -z "$CERT_EXISTS" ]; then
                    echo "Certificate '$CERTIFICATE_NAME' was not found in environment '$CONTAINER_ENV'."
                    cat /tmp/wizdle_web_cert_err.txt || true
                    echo "Available certificates:"
                    az containerapp env certificate list \
                      --name "$CONTAINER_ENV" \
                      --resource-group "$RESOURCE_GROUP" \
                      --query "[].name" \
                      --output tsv || true
                    exit 1
                  fi

                  EXISTING=$(az containerapp hostname list \
                    --name wizdle-web \
                    --resource-group "$RESOURCE_GROUP" \
                    --query "[?name=='$WIZDLE_WEB_CUSTOM_HOSTNAME'].name" \
                    --output tsv 2>/dev/null || echo "")

                  if [ -z "$EXISTING" ]; then
                    echo "Binding custom hostname $WIZDLE_WEB_CUSTOM_HOSTNAME with certificate $CERTIFICATE_NAME"
                    echo "Reached bind command for wizdle-web."
                    az containerapp hostname bind \
                      --name wizdle-web \
                      --resource-group "$RESOURCE_GROUP" \
                      --hostname "$WIZDLE_WEB_CUSTOM_HOSTNAME" \
                      --certificate "$CERTIFICATE_NAME" \
                      --environment "$CONTAINER_ENV"
                  else
                    echo "Custom hostname $WIZDLE_WEB_CUSTOM_HOSTNAME is already bound."
                  fi

            - name: Set Domain for Wizdle API
              working-directory: Wizdle.AppHost
              env:
                  AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
                  AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
                  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
                  WIZDLE_API_CUSTOM_HOSTNAME: ${{ vars.WIZDLE_API_CUSTOM_HOSTNAME }}
                  CERTIFICATE_NAME: ${{ vars.CERTIFICATE_NAME }}
              run: |
                  RESOURCE_GROUP=$(azd env get-value AZURE_RESOURCE_GROUP)
                  echo "Resource group: $RESOURCE_GROUP"

                  if [ -z "$RESOURCE_GROUP" ]; then
                    echo "AZURE_RESOURCE_GROUP is empty."
                    exit 1
                  fi

                  if [ -z "$WIZDLE_API_CUSTOM_HOSTNAME" ]; then
                    echo "WIZDLE_API_CUSTOM_HOSTNAME is not set."
                    exit 1
                  fi

                  if [ -z "$CERTIFICATE_NAME" ]; then
                    echo "CERTIFICATE_NAME is not set."
                    exit 1
                  fi

                  ENV_RESOURCE_ID=$(az containerapp show \
                    --name wizdle-api \
                    --resource-group "$RESOURCE_GROUP" \
                    --query 'properties.managedEnvironmentId' \
                    --output tsv 2>/tmp/wizdle_api_env_err.txt || true)

                  if [ -z "$ENV_RESOURCE_ID" ]; then
                    ENV_RESOURCE_ID=$(az containerapp show \
                      --name wizdle-api \
                      --resource-group "$RESOURCE_GROUP" \
                      --query 'properties.environmentId' \
                      --output tsv 2>>/tmp/wizdle_api_env_err.txt || true)
                  fi

                  if [ -z "$ENV_RESOURCE_ID" ]; then
                    echo "Could not determine Container Apps environment ID for wizdle-api."
                    cat /tmp/wizdle_api_env_err.txt || true
                    exit 1
                  fi

                  CONTAINER_ENV="${ENV_RESOURCE_ID##*/}"
                  echo "Container Apps environment: $CONTAINER_ENV"

                  CERT_EXISTS=$(az containerapp env certificate list \
                    --name "$CONTAINER_ENV" \
                    --resource-group "$RESOURCE_GROUP" \
                    --query "[?name=='$CERTIFICATE_NAME'].name" \
                    --output tsv 2>/tmp/wizdle_api_cert_err.txt || true)

                  if [ -z "$CERT_EXISTS" ]; then
                    echo "Certificate '$CERTIFICATE_NAME' was not found in environment '$CONTAINER_ENV'."
                    cat /tmp/wizdle_api_cert_err.txt || true
                    echo "Available certificates:"
                    az containerapp env certificate list \
                      --name "$CONTAINER_ENV" \
                      --resource-group "$RESOURCE_GROUP" \
                      --query "[].name" \
                      --output tsv || true
                    exit 1
                  fi

                  EXISTING=$(az containerapp hostname list \
                    --name wizdle-api \
                    --resource-group "$RESOURCE_GROUP" \
                    --query "[?name=='$WIZDLE_API_CUSTOM_HOSTNAME'].name" \
                    --output tsv 2>/dev/null || echo "")

                  if [ -z "$EXISTING" ]; then
                    echo "Binding custom hostname $WIZDLE_API_CUSTOM_HOSTNAME with certificate $CERTIFICATE_NAME"
                    echo "Reached bind command for wizdle-api."
                    az containerapp hostname bind \
                      --name wizdle-api \
                      --resource-group "$RESOURCE_GROUP" \
                      --hostname "$WIZDLE_API_CUSTOM_HOSTNAME" \
                      --certificate "$CERTIFICATE_NAME" \
                      --environment "$CONTAINER_ENV"
                  else
                    echo "Custom hostname $WIZDLE_API_CUSTOM_HOSTNAME is already bound."
                  fi