name: Release
run-name: Release ${{ github.ref_name }}
permissions:
    contents: read
on:
    release:
        types: [published]
jobs:
    get_version:
        name: "[Release] Get Version"
        uses: ./.github/workflows/get_version.yaml

    build_and_test:
        name: "[Release] Build and Test"
        uses: ./.github/workflows/build_test.yaml
        permissions:
            contents: read
            actions: read
            checks: write

    performance_tests:
        name: "[Release] Performance Tests"
        uses: ./.github/workflows/performance_tests.yaml
        permissions:
            contents: read

    build_test_publish:
        name: Build, Test & Publish
        needs: [get_version, build_and_test, performance_tests]
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            id-token: write
            contents: write
            checks: write
        env:
            CONFIGURATION: Release
            TARGET_FRAMEWORK: net10.0
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v7

            - name: Install .NET
              uses: actions/setup-dotnet@v6
              with:
                  global-json-file: global.json

            - name: Restore
              run: dotnet restore

            - name: Build
              id: build
              run: dotnet build --no-restore --configuration ${{ env.CONFIGURATION }} /p:Version=${{ needs.get_version.outputs.version }}

            - name: NuGet Login
              uses: NuGet/login@v1
              id: nuget_login
              with:
                  user: ${{ secrets.NUGET_USER }}

            - name: Push to NuGet
              run: dotnet nuget push **.nupkg --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} --source "https://api.nuget.org/v3/index.json" --skip-duplicate

            - name: Push to GitHub
              run: dotnet nuget push **.nupkg --api-key ${{secrets.GITHUB}} --source "https://nuget.pkg.github.com/lyndychivs/index.json" --skip-duplicate

            - name: Upload Package to Release
              uses: softprops/action-gh-release@v3
              with:
                  files: |
                      **/*.nupkg
                      **/*.snupkg

    build_wpf_installer:
        name: Build WPF Installer
        needs: [get_version, build_and_test, performance_tests]
        runs-on: windows-latest
        timeout-minutes: 10
        permissions:
          contents: write
        env:
            CONFIGURATION: Release
            TARGET_FRAMEWORK: net10.0-windows
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v7

            - name: Install .NET
              uses: actions/setup-dotnet@v6
              with:
                  global-json-file: global.json

            - name: Restore
              run: dotnet restore

            - name: Publish Wizdle.Wpf for win-x64
              run: dotnet publish Wizdle.Wpf/Wizdle.Wpf.csproj --configuration ${{ env.CONFIGURATION }} --runtime win-x64 --self-contained true /p:PublishSingleFile=true /p:Version=${{ needs.get_version.outputs.version }}

            - name: Publish Wizdle.Wpf for win-x86
              run: dotnet publish Wizdle.Wpf/Wizdle.Wpf.csproj --configuration ${{ env.CONFIGURATION }} --runtime win-x86 --self-contained true /p:PublishSingleFile=true /p:Version=${{ needs.get_version.outputs.version }}

            - name: Update ISS version for x64
              shell: pwsh
              run: |
                  $content = Get-Content 'Wizdle.Wpf.Installer/Wizdle.Windows.x64.iss' -Raw
                  $content = $content -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"${{ needs.get_version.outputs.version }}`""
                  Set-Content 'Wizdle.Wpf.Installer/Wizdle.Windows.x64.iss' -Value $content

            - name: Update ISS version for x86
              shell: pwsh
              run: |
                  $content = Get-Content 'Wizdle.Wpf.Installer/Wizdle.Windows.x86.iss' -Raw
                  $content = $content -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"${{ needs.get_version.outputs.version }}`""
                  Set-Content 'Wizdle.Wpf.Installer/Wizdle.Windows.x86.iss' -Value $content

            - name: Install Inno Setup
              shell: pwsh
              run: |
                  choco install innosetup -y

            - name: Compile x64 Installer
              shell: pwsh
              run: |
                  & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Wizdle.Wpf.Installer\Wizdle.Windows.x64.iss"

            - name: Compile x86 Installer
              shell: pwsh
              run: |
                  & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Wizdle.Wpf.Installer\Wizdle.Windows.x86.iss"

            - name: Upload Installers to Release
              uses: softprops/action-gh-release@v3
              with:
                  files: |
                      Wizdle.Wpf.Installer/Output/*.exe

    deploy_azure:
        name: "[Release] Deploy Azure"
        needs: [build_test_publish, build_wpf_installer]
        uses: ./.github/workflows/deploy_azure.yaml
        permissions:
            id-token: write
            contents: read
        secrets: inherit
